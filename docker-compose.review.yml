services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: taskflow
      POSTGRES_USER: taskflow
      POSTGRES_PASSWORD: taskflow123
    ports:
      - "5540:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taskflow"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    image: mateuslll/taskflow-backend:latest
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SERVER_PORT: 8080
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: taskflow
      DATASOURCE_USERNAME: taskflow
      DATASOURCE_PASSWORD: taskflow123
      JPA_DDL_AUTO: update
      TZ: Europe/Lisbon
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    image: mateuslll/taskflow-frontend:latest
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8080/api/v1
      NODE_ENV: production
    depends_on:
      - backend
